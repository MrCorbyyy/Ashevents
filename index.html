
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ─── Primary SEO ─────────────────────────────────────────────────── -->
    <title>Ash Events | Professional Event Planning Services</title>
    <meta name="description" content="Ash Events offers premium event planning services for weddings, corporate events, birthdays, and more. Let us turn your vision into an unforgettable experience." />
    <meta name="keywords" content="event planning, event planner, wedding planner, corporate events, birthday parties, Ash Events, event management, party planning" />
    <meta name="author" content="Ash Events" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://ashevents.vercel.app/" />

    <!-- ─── Snapchat, Instagram & WhatsApp Link Previews ────────────────── -->
    <!-- All three platforms read Open Graph (og:) tags for rich link previews -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://ashevents.vercel.app/" />
    <meta property="og:title" content="Ash Events | Professional Event Planning Services" />
    <meta property="og:description" content="Premium event planning for weddings, corporate events, birthdays, and more. Ash Events makes every occasion extraordinary." />
    <meta property="og:image" content="https://ashevents.vercel.app/images/ashevents logo..png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="Ash Events" />
    <meta property="og:locale" content="en_GH" />

    <!-- WhatsApp: uses og:tags above + explicit description length tip (keep under 65 chars) -->
    <!-- Instagram: reads og:image (min 1200×630px recommended for best display)             -->
    <!-- Snapchat: reads og:title, og:description, og:image for Snap previews               -->

    <!-- ─── Favicon ───────────────────────────────────────────────────────── -->
    <link rel="icon" type="image/png" href="/images/ashevents logo..png" />

    <!-- ─── JSON-LD Structured Data (LocalBusiness) ──────────────────────── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "EventPlanningService",
      "name": "Ash Events",
      "url": "https://ashevents.vercel.app",
      "logo": "https://ashevents.vercel.app/images/ashevents logo..png",
      "description": "Professional event planning services for weddings, corporate events, birthdays, and special occasions.",
      "priceRange": "$$",
      "sameAs": []
    }
    </script>

    <style>html, body { height: 100%; margin: 0; } #root { height: 100%; }</style>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
